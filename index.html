<!DOCTYPE html>

  <style>
    body { font-family: Arial, sans-serif; margin:0; background:#f1f2f6; color:#2f3640; }
    header { background:#273c75; color:#fff; padding:20px; text-align:center; }
    h1 { margin:0; font-size:1.8em; }
    .container { max-width:900px; margin:20px auto; padding:20px; background:#fff; border-radius:10px; box-shadow:0 5px 15px rgba(0,0,0,0.1); }
    .autocomplete { position:relative; display:block; width:100%; margin-bottom:20px; }
    input { width:100%; padding:10px; box-sizing:border-box; border-radius:5px; border:1px solid #ccc; }
    .autocomplete-items { position:absolute; border:1px solid #d4d4d4; border-top:none; z-index:99; top:100%; left:0; right:0; background:#fff; max-height:200px; overflow-y:auto; border-radius:0 0 5px 5px; }
    .autocomplete-items div { padding:10px; cursor:pointer; border-bottom:1px solid #d4d4d4; }
    .autocomplete-items div:hover { background-color:#f1f2f6; }
    .selected-drinks { margin-bottom:20px; }
    .selected-drinks li { margin:5px 0; display:flex; justify-content:space-between; align-items:center; background:#dcdde1; padding:8px 12px; border-radius:5px; }
    .selected-drinks button { margin-left:5px; padding:4px 8px; border:none; border-radius:4px; cursor:pointer; }
    .btn-edit { background:#44bd32; color:#fff; }
    .btn-delete { background:#e84118; color:#fff; }
    button.calculate, button.clear { padding:10px 15px; margin-right:10px; border:none; border-radius:5px; cursor:pointer; color:#fff; }
    button.calculate { background:#0097e6; }
    button.clear { background:#7f8fa6; }
    table { width:100%; border-collapse:collapse; margin-top:20px; }
    th, td { padding:10px; text-align:left; border-bottom:1px solid #dcdde1; }
    th { background:#f5f6fa; }
    h2 { margin-top:30px; border-bottom:2px solid #dcdde1; padding-bottom:5px; }
  </style>
</head>
<body>

  <button class="calculate" onclick="calculate()">Calculate Ingredients</button>
  <button class="clear" onclick="clearAll()">Clear</button>

<script>

// --- Autocomplete & main logic ---
const input = document.getElementById("drink-input");
const selectedDrinksList = document.getElementById("selected-drinks");
const ingredientTotalsDiv = document.getElementById("ingredient-totals");
const selectedDrinks = [];

function autocomplete(inp, arr) {
  let currentFocus;
  inp.addEventListener("input", function() {
    let val = this.value;
    closeAllLists();
    if(!val) return false;
    currentFocus = -1;

    const listDiv = document.createElement("DIV");
    listDiv.setAttribute("id", this.id + "autocomplete-list");
    listDiv.setAttribute("class","autocomplete-items");
    this.parentNode.appendChild(listDiv);

    for(let i=0;i<arr.length;i++){
      if(arr[i].toLowerCase().includes(val.toLowerCase())){
        const itemDiv = document.createElement("DIV");
        itemDiv.innerHTML = "<strong>" + arr[i].substr(0,val.length) + "</strong>" + arr[i].substr(val.length);
        itemDiv.addEventListener("click", function(){
          let qty = prompt("Enter quantity:","1");
          qty = parseInt(qty) || 1;
          addSelectedDrink(arr[i],qty);
          inp.value="";
          closeAllLists();
        });
        listDiv.appendChild(itemDiv);
      }
    }
  });

  inp.addEventListener("keydown", function(e){
    let x = document.getElementById(this.id + "autocomplete-list");
    if(x) x = x.getElementsByTagName("div");
    if(e.keyCode==40){currentFocus++;addActive(x);}
    else if(e.keyCode==38){currentFocus--;addActive(x);}
    else if(e.keyCode==13){e.preventDefault(); if(currentFocus>-1){ if(x) x[currentFocus].click(); }}
  });

  function addActive(x){ if(!x) return false; removeActive(x); if(currentFocus>=x.length) currentFocus=0; if(currentFocus<0) currentFocus=x.length-1; x[currentFocus].classList.add("autocomplete-active"); }
  function removeActive(x){ for(let i=0;i<x.length;i++) x[i].classList.remove("autocomplete-active"); }
  function closeAllLists(elmnt){ const x=document.getElementsByClassName("autocomplete-items"); for(let i=0;i<x.length;i++){ if(elmnt!=x[i] && elmnt!=inp) x[i].parentNode.removeChild(x[i]); }}
  document.addEventListener("click", function(e){ closeAllLists(e.target); });
}

function addSelectedDrink(name, qty){
  const existingIndex = selectedDrinks.findIndex(d => d.name === name);
  if(existingIndex > -1){ selectedDrinks[existingIndex].qty += qty; }
  else{ selectedDrinks.push({name, qty}); }
  renderSelectedDrinks();
}

function renderSelectedDrinks(){
  selectedDrinksList.innerHTML="";
  selectedDrinks.forEach((d,i)=>{
    const li = document.createElement("li");
    li.innerHTML = `${d.name} - ${d.qty} <span>
      <button class="btn-edit" onclick="editDrink(${i})">Edit</button>
      <button class="btn-delete" onclick="deleteDrink(${i})">Delete</button>
    </span>`;
    selectedDrinksList.appendChild(li);
  });
}

function editDrink(index){
  let newQty = prompt("Edit quantity:",selectedDrinks[index].qty);
  newQty = parseInt(newQty) || selectedDrinks[index].qty;
  selectedDrinks[index].qty = newQty;
  renderSelectedDrinks();
}

function deleteDrink(index){
  selectedDrinks.splice(index,1);
  renderSelectedDrinks();
}

function calculate(){
  const totals = {};
  selectedDrinks.forEach(d=>{
    const recipe = drinks[d.name].category;
    for(let ing in recipe){
      const cat = recipe[ing].type;
      if(!totals[cat]) totals[cat] = {};
      const ingQty = recipe[ing].qty;
      totals[cat][ing] = (totals[cat][ing] || 0) + ingQty * d.qty;
    }
  });

  ingredientTotalsDiv.innerHTML="";
  for(let cat in totals){
    const catData = totals[cat];
    if(Object.keys(catData).length>0){
      const h2 = document.createElement("h2"); h2.textContent = cat; ingredientTotalsDiv.appendChild(h2);
      const table = document.createElement("table");
      const tbody = document.createElement("tbody");
      for(let ing in catData){
        const row = document.createElement("tr");
        row.innerHTML = `<td>${ing}</td><td>${catData[ing]}</td>`;
        tbody.appendChild(row);
      }
      table.appendChild(tbody);
      ingredientTotalsDiv.appendChild(table);
    }
  }
}

function clearAll(){
  selectedDrinks.length=0;
  selectedDrinksList.innerHTML="";
  ingredientTotalsDiv.innerHTML="";
  input.value="";
}

autocomplete(input,Object.keys(drinks));
</script>
